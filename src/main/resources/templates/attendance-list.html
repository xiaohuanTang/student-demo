<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>考勤记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h3>我的考勤记录</h3>
        </div>
        <div class="card-body">
            <form method="get" th:action="@{/attendance/list}" class="row g-3 mb-4">
                <div class="col-md-4">
                    <input type="date" class="form-control" name="startDate" th:value="${startDate}" placeholder="开始日期">
                </div>
                <div class="col-md-4">
                    <input type="date" class="form-control" name="endDate" th:value="${endDate}" placeholder="结束日期">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="">全部状态</option>
                        <option value="NORMAL" th:selected="${status == 'NORMAL'}">正常</option>
                        <option value="LATE" th:selected="${status == 'LATE'}">迟到</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-primary">查询</button>
                </div>
            </form>

            <table class="table table-striped">
                <thead>
                <tr>
                    <th>日期</th>
                    <th>课程</th>
                    <th>打卡时间</th>
                    <th>状态</th>
                    <th>备注</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(records)}">
                    <td colspan="5" class="text-center">暂无考勤记录</td>
                </tr>
                <tr th:each="record : ${records}">
                    <td th:text="${#temporals.format(record.checkInTime, 'yyyy-MM-dd')}"></td>
                    <td th:text="${record.courseName}"></td>
                    <td th:text="${#temporals.format(record.checkInTime, 'HH:mm:ss')}"></td>
                    <td>
                                <span class="badge"
                                      th:class="${record.status == 'NORMAL'} ? 'bg-success' : 'bg-warning'"
                                      th:text="${record.status == 'NORMAL'} ? '正常' : '迟到'">
                                </span>
                    </td>
                    <td th:text="${record.remark != null ? record.remark : '-'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
