<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑学生</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3>编辑学生</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/student/save}" method="post">
                <input type="hidden" name="id" th:value="${student.id}">
                <div class="mb-3">
                    <label class="form-label">姓名：</label>
                    <input type="text" name="name" class="form-control" th:value="${student.name}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">学号：</label>
                    <input type="text" name="studentNo" class="form-control" th:value="${student.studentNo}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">班级：</label>
                    <input type="text" name="className" class="form-control" th:value="${student.className}">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="/student/list" class="btn btn-secondary">返回</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
